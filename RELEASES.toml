# Release manifest — which tag of each repo belongs to a release combo.
# The server checks out ONE release name across the scqo-versioned repos and takes
# scqat at its pinned tag (scqat versions independently: its own pyproject/tag line).
# Hand-edited at release time by the manager (see RELEASING.md).

[v0-11-1]
date = 2026-07-23
scqo = "v0.11.1"                 # coherent-drive experiments reduce IQ via scqat axial (not raw I); flux-arch trust gates
lchqbdriver = "v0.11.1"          # no-change re-tag (probe-only; coherent-drive probes already emit I/Q)
lchqmdriver = "v0.11.1"          # no-change re-tag (probe-only; coherent-drive probes already emit I/Q)
scqo-contrib = "v0.11.1"         # no-change re-tag
scqat = "v0.2.0"                 # NEW: IQ->1D radial/axial reduction + flux-arch seed/gates + shared iq_plane panel
notes = "IQ->1-D signal reduction becomes a shared scqat concern and the coherent-drive experiments stop discarding a quadrature. scqat (bumped to v0.2.0, THE COMBO MUST PIN IT -- the experiments' estimate() now calls scqat.tools.iq_reduce, absent in the v0.1.8 tag) gains two geometry-matched reductions: radial |IQ-ref| (the spectroscopy family; ref = off-resonance/ground median, per-slice for flux maps) and axial, the signed projection onto the |0>-|1> axis (the coherent-drive family; axis resolved angle->positions->PCA). The four coherent-drive experiments (qubit_power_rabi/qubit_ramsey/qubit_echo/qubit_relaxation) now hand complex I/Q to the estimator -- reduced via axial, PCA at bring-up -- instead of rename({'I':'signal'}) (raw I lost contrast as cos(readout_rotation), near-zero when the state separation sits in Q); estimate() renames only the sweep axis, and simulate() emits faithful IQ (population placed at a random readout rotation with noise in both quadratures, so the offline sims exercise the reduction instead of hiding it). The estimators still accept a pre-reduced real 'signal' unchanged (the FPGA-discriminated 'state' path). scqat's qubit_spectroscopy_flux / qubit_flux_arch additionally gain a wrong-basin GUARD: the transmon-arch fit seeds its flux period from the arch-top curvature (top-only bring-up windows have period >> the swept span, where the old period=span seed converged to a spurious basin) and GATES success on the arch top being observed inside the swept frequency window (+15% margin) and the curve tracking the branch points (rms residual <= span/4); the flux figures now draw the per-slice REDUCED map (a weak line is invisible under the raw |IQ| ground offset + chain ripple). All seven IQ-reducing estimators emit a shared 'iq_plane' figure (the raw IQ cloud + the reference actually used: radial point / per-slice trajectory / axial axis, titled with the reduction kind), and stamp reduction_method / reduction_angle (+ ref_source) into metadata. Drivers unchanged: every coherent-drive experiment on LCHQM/LCHQB is probe-only and already saves buffered/averaged I/Q (use_state_discrimination False), and simulate() is inherited from scqo, so lchqbdriver/lchqmdriver/scqo-contrib get no-change re-tags at v0.11.1 (an estimation-only combo, the v0.10.2 pattern). UPGRADE REQUIRES: git fetch --tags && git checkout v0.11.1 in the four scqo-versioned repos AND scqat at v0.2.0, then re-run `uv pip install -e . --no-deps` in each editable env (refreshes the version scqo doctor reports -- the frozen .dist-info is not updated by git pull -- and registers scqat.tools.iq_reduce). No config or data action: no schema change and no reindex (index stays v7); old run folders are immutable and stay findable. BEHAVIOR: additive to the schema, but a re-fit of the SAME raw data shifts results two ways. (1) Coherent-drive: the fit now uses the full IQ (axial/PCA) rather than raw I -- it recovers contrast where the readout is not aligned to I (validated on real QM 5Q4C data: up to 2.16x on power_rabi) and is unchanged where it already was; the extracted pi_amp / T1 / T2* / T2echo / detuning are the same physics at higher SNR. (2) qubit_spectroscopy_flux now GATES the arch fit: a fit whose top was never observed in the swept window (or that misses the branch points) is reported FAILED (outcome FAILED, no writeback) instead of a spurious 'success', so an in-window arch that previously read a wildly-off f01_max/Ej_sum now either fits correctly or fails honestly. DATA CAVEAT: pre-v0.11.1 qubit_spectroscopy_flux runs may carry a spurious arch fit (e.g. run 20260723-134245 read f01_max 6.27 GHz / Ej_sum 26.2 GHz for an in-window ~5.14 GHz arch); re-run them, or reject their persisted ej_sum_hz / f_q_max_hz / v_offset_v / v_per_phi0_v, under v0.11.1. PREREQUISITE: v0.11.0 (the drive_power_dbm combo entered below but not yet tagged) must be cut first -- bump SCQO pyproject 0.10.2->0.11.0 and tag the four repos v0.11.0 -- so the tag history and scqo --version stay consistent before v0.11.1 is cut on top."

