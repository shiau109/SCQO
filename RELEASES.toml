notes = "The component model. A device is now a set of named COMPONENTS, each binding up to two CATEGORY slots -- a physical one (what it is: FixedTransmon/FluxTunableTransmon/Resonator/ReadoutLine/XYControl/ZControl/Coupling; fields land in physical.json) and an instrument one (how we drive it: ReadableTransmon/TransmonPair; fields land in scqo_state.json). Structure lives in a per-device components.toml (names + slots + members/topology + operations + DESIGN values); value stores stay flat numeric. A field's home is decided by the codified PLACEMENT RULE (scqo state --rule; TUTORIAL section 10). Backends declare a per-category field catalog (scqo state --fields: VendorBinding/VendorOnly, the neutral<->vendor mapping as DATA), and scqo set QUBIT.FIELD=VALUE writes an experience value with no run. Phase 2 adds two-qubit PAIRS (QCQ tunable-coupler): Coupling + TransmonPair on one name (members high/low + optional coupler satellite), the pair_zz_coupler experiment (maps residual ZZ vs coupler bias and proposes coupler_decouple_v + zz_hz), and an assignable flux_component on the flux experiments (sweep a neighbor's z or a pair's coupler; record-only). readout_duration_s + readout_integration_s promoted to neutral ReadableTransmon fields (window <= duration, 4 ns grid); idle_flux_v realized on QM (z-line flux-point offset). RENAMES (no aliases): CLI --qubits->--targets and --qubit->--component; the dataset target dim qubit->target; fit keys on NEW runs kappa_hz->kappa_tot_hz, ej_sum_ghz->ej_sum_hz (now Hz, x1e9), sweet_spot_flux_v->v_offset_v, dv_phi0_v->v_per_phi0_v, plus new f_01_hz. Store schema 2: on first contact a pre-v2 scqo_state.json/physical.json and its history sidecar are archived aside as *.v1.bak and the store reseeds (pull mode reseeds calibration from the vendor); history starts a fresh epoch (values with no visible row are expected). scqo state renders one table per category. UPGRADE REQUIRES: write a components.toml roster per device (scqo doctor hard-errors without it and prints a minimal template; component names must match the vendor config EXACTLY) -- existing chipA/chipT already carry one; rename any parameters.toml / script usage of --qubits to --targets. No reinstall: entry points unchanged, git pull + checkout suffices on editables. BEHAVIOR CHANGE: old run FOLDERS are immutable and stay findable (reindex maps the old 'qubits' record key to 'targets'; result.fit keeps its run-target keys, so trends are continuous); old datasets keep the 'qubit' dim (unread post-fit); pre-v0.10 pending suggestions are display-only (accept refuses the old format); QM stays state_sync=pull. CAVEAT: the Phase 2 PAIR path (Coupling/TransmonPair, pair_zz_coupler, idle_flux_v on flux chips) is validated by tests + simulation + OFFLINE checks against the real 5-qubit quam_state, but has NOT yet run on live pair hardware -- a pairs-only fix would be v0.10.1. scqo-contrib is a no-change re-tag for combo coherence; its sandbox experiments may still use the pre-component API and need migration."

