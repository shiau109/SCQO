# Release manifest — which tag of each repo belongs to a release combo.
# The server checks out ONE release name across the scqo-versioned repos and takes
# scqat at its pinned tag (scqat versions independently: its own pyproject/tag line).
# Hand-edited at release time by the manager (see RELEASING.md).

[v0-7-0]
date = 2026-07-12
scqo = "v0.7.0"
lchqbdriver = "v0.7.0"           # factory text; ENTIRE scripts/ wrapper layer retired (wrappers, shims, launcher stubs)
lchqmdriver = "v0.7.0"           # same: scripts/ keeps only check_real_config.py
scqo-contrib = "v0.7.0"          # no-change re-tag
scqat = "v0.1.5"                 # unchanged pin
notes = "Named user-selectable setups: cooldowns.toml setups become [cycle.setup.<name>] tables (keys backend/instrument_config/note; 'since' dates + port maps retired — wiring lives in the vendor config folder; the v0.6 [[.setup]] array form refuses loudly). user.toml gains setup; scqo user --device/--setup selects (and WRITES user.toml); a single-setup cycle auto-selects, several refuse until selected. Zero-setup cycles are legal (cooldown start opens an EMPTY cycle; runs refuse until a setup block is hand-added). Runs stamp (cooldown, setup NAME); index auto-rebuilds (schema v7, old runs reindex with empty setup); scqo find --setup; accept era guard compares names. CLI regrouping: state (was device), user (new), device = admin group absorbing devices/sample/cooldown (no aliases); sync-launchers RETIRED with the drivers' whole scripts/ wrapper layer (command wrappers, _lab/_cli shims, launcher stubs) — scqo run <name> is the one way; driver scripts/ keeps only per-repo content (check_real_config.py + LCHQB's ai_loop_demo.py). UPGRADE REQUIRES: hand-edit each device's cooldowns.toml to named setup tables (fresh-start: old array form is not read); no reinstall needed. BEHAVIOR CHANGE: multi-setup cycles refuse runs until scqo user --setup."

[v0-6-0]
date = 2026-07-12
scqo = "v0.6.0"
lchqbdriver = "v0.6.0"           # scripts pass update="apply" explicitly; launcher stubs regenerated
lchqmdriver = "v0.6.0"           # same script/stub updates as the qblox driver
scqo-contrib = "v0.6.0"          # no-change re-tag
scqat = "v0.1.5"                 # unchanged pin
notes = "Suggest -> review -> accept: runs DEFAULT to suggesting fitted values (a terminal prompts; Enter applies nothing; scqo accept <run_id> decides later; --accept / update=\"apply\" = pre-v0.6 behavior; calibrate prompts per step). t1/t2 moved out of scqo_state.json into per-sample physical.json (scqo device --physical); legacy state keys not read. Index auto-rebuilds (schema v6). Live-source provenance: scqo device --sources + viewer live: markers (strict match; vendor reseeds show 'externally changed'). Guards ask [y/N] at a terminal (--force/--reapply are the script form). UPGRADE REQUIRES: nothing -- no config/data action; editable dev installs just git pull. BEHAVIOR CHANGE: runs no longer write back by default -- INSTALL section 2 v0.6.0 note."

[v0-5-0]
date = 2026-07-08
scqo = "v0.5.0"
lchqbdriver = "v0.5.0"
lchqmdriver = "v0.5.0"
scqo-contrib = "v0.5.0"          # real change: template DatasetContract fixed to the plural sweeps API
scqat = "v0.1.5"                 # independent line (v0.1.4 + version-metadata fix)
notes = "Device-centric config: user.toml picks the device; [[cycle.setup]] owns backend + instrument_config (canonical vendor filenames); instruments.toml, [qblox]/[qm] tables, [lab] backend/device_name/state_path and twin modes retired (not read). UPGRADE REQUIRES: uv pip install -e re-runs AND manual edits — shrink config.toml to [lab] data_root(+device), user.toml backend->device, cooldowns.toml [[.mapping]]->[[.setup]] + backend/instrument_config, delete instruments.toml (INSTALL §2 upgrade note). Index auto-rebuilds (schema v5); post-cooldown-end runs refuse."

[v0-4-1]
date = 2026-07-07
scqo = "v0.4.1"
lchqbdriver = "v0.4.1"
lchqmdriver = "v0.4.1"
scqo-contrib = "v0.4.1"          # no-change re-tag
scqat = "v0.1.4"                 # independent line; >= v0.1.4 required (punchout coupling)
notes = "scqo doctor; missing-driver error covers stale installs; suite isolated from real ~/.scqo; viewer tests skip without python-multipart; docs (SSH editing, server backend policy, parameters_file clarity)"

