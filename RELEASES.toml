scqo-contrib = "v0.11.0"         # no-change re-tag
scqat = "v0.1.8"                 # unchanged pin (the qubit_spectroscopy estimator consumes no amplitude/power)
notes = "Absolute drive power. qubit_spectroscopy's drive_amp Parameter (backend units: amplitude factor on QM, voltage offset on Qblox -- the same value delivered ~-21 dBm on QM chipA but ~-33 dBm on Qblox chipA) is REMOVED and replaced by drive_power_dbm (absolute dBm at the instrument drive port; default -25.0, cap +10; stale [qubit_spectroscopy] parameters.toml keys fail loudly -- values are now dBm, not a fraction). Two NEW pushed ReadableTransmon fields mirror the readout pair exactly: drive_amp (the saturation/spec drive amplitude, portable=False chain residual) declared BEFORE drive_power_dbm (portable absolute power, wins on push; coupled drive_amp echo recorded). Setters solve the DRIVE chain keeping the amplitude <= 0.5 full scale: QM picks q.xy full_scale_power_dbm on the -11..+16 dBm 3 dB grid with the saturation op amplitude as the exact residual (power_tools, operation-generic); Qblox picks the largest EVEN drive-port output_att in 0..60 with the residual on the NEW element.spec.spec_amp slot (nominal +5 dBm full scale, +/- a few dB honesty as for readout). qubit_spectroscopy.run() now does the punchout discipline: recorded boundary write of drive_power_dbm -> acquire -> exact revert in finally (2 ChangeRecords + coupled echoes per qubit); it REFUSES when a target's drive_power_dbm is unknown (unconfigured drive chain / unset saturation amplitude). The QM probe plays the saturation op at amplitude_scale=1.0; the Qblox probe plays each qubit's OWN view.drive_amp as the CW VoltageOffset (per-qubit, previously one global value). power_context gains drive-chain provenance keys (drive_full_scale_power_dbm/saturation_amp on QM; drive_output_att_db/spec_amp on Qblox; drive_power_dbm + drive LO on both). SHARED-CHAIN CAVEAT (documented in the catalog + fieldmaps): the drive chain scale is shared by every xy operation, so while it is off its standing value the stored pi_amp means a different power -- harmless in qubit_spectroscopy (no pi pulse played; the discrete chain knob + verbatim amplitude restore make the revert lossless), but scqo set QUBIT.drive_power_dbm=... IS a real re-scale of what pi_amp delivers. Both drive-chain vendor knobs flip kind vendor->realizer in the fieldmaps. UPGRADE REQUIRES (Qblox): flip each dut_config.json element_type BasicTransmonElement->LCHTransmonElement and add a 'spec': {'spec_amp': <value>} block (chipA cd1 updated in-tree with spec_amp 0.1 = the exact old default drive); a config missing the spec block still LOADS (spec_amp deserializes NaN = field unknown) but qubit_spectroscopy refuses until it is seeded (config edit or scqo set q1.drive_power_dbm=...). FluxTunableTransmonElement now subclasses LCHTransmonElement, so flux duts inherit the slot with NO edit. UPGRADE REQUIRES (QM): every qubit needs a 'saturation' xy operation (chipA has one; amp 0.2 at fs +13 = standing ~-1 dBm) -- pull-mode seeds the new fields from it, no config edit. No reinstall: no entry-point changes, git pull suffices on editables. BEHAVIOR: qubit_spectroscopy_flux now takes its OWN per-run drive_power_dbm (default -25 dBm, same recorded set->revert boundary as qubit_spectroscopy, via the shared scqo/experiments/_drive_power.py context manager): QM needed no probe change (its flux probe already played operation_amp=1.0 = the parked saturation amplitude), while the Qblox flux probe was SWITCHED from the calibrated X (pi) pulse to a weak CW saturation VoltageOffset (view.drive_amp / the spec_amp residual, cal07b pattern) -- so drive_power_dbm governs the flux map identically on both backends, and the Qblox flux map no longer needs a calibrated pi (works during bring-up). Old run folders and the index (schema v7) are unchanged; saved user parameter files carrying drive_amp are invalid (rename to drive_power_dbm, in dBm)."

[v0-10-2]
date = 2026-07-21
scqo = "v0.10.2"                 # resonator_spectroscopy gains analysis_method (lorentzian|circle) + baseline_order
lchqbdriver = "v0.10.2"          # no-change re-tag (probe-only; inherits the estimator switch)
lchqmdriver = "v0.10.2"          # no-change re-tag (probe-only; inherits the estimator switch)
scqo-contrib = "v0.10.2"         # no-change re-tag
scqat = "v0.1.8"                 # NEW: multi-method resonator estimator (joint-bg lorentzian + Probst circle)
notes = "Resonator spectroscopy analysis becomes multi-method. resonator_spectroscopy gains two Parameters: analysis_method ('lorentzian' default | 'circle') and baseline_order (0/1/2, lorentzian only). 'lorentzian' is a joint Lorentzian + polynomial-background fit of the power |IQ|^2 that REPLACES the old quantile subtract-then-fit baseline (no legacy path) -- it removes the f_res/kappa bias the value-based quiet-quantile mask produced on sloped/curved backgrounds (a horizontal band of points collapsed the order-1 baseline to nearly flat). 'circle' is a native Probst notch-model fit of the complex S21 (power-Lorentzian-seeded, multi-start over cable-delay candidates + full-model complex least-squares, delay fixed per candidate to avoid the delay/alpha/phi0 degeneracy; phase-less data gated out by a circularity test) that also yields Qi/Qc/phi0/delay; validated on real QM 5Q4C data against the vendored NCU resonator_tools (Qi within 4%, delay within 0.1 ns). The estimator + both fitters live in scqat, bumped to v0.1.8 (the combo MUST pin it -- SCQO.estimate() forwards method=/baseline_order= into scqat.estimators.resonator_spectroscopy, and the circle method + fit_notch_circle/fit_lorentzian_bg do not exist in the older v0.1.7 tag). Drivers unchanged: LCHQB/LCHQM resonator_spectroscopy is probe-only and inherits the switch, so lchqbdriver/lchqmdriver/scqo-contrib get no-change re-tags at v0.10.2 (analysis-only combo). UPGRADE REQUIRES: git fetch --tags && git checkout v0.10.2 (scqo) and scqat at v0.1.8, then re-run `uv pip install -e . --no-deps` in each editable env (refreshes the version scqo doctor reports and registers the new estimator methods). No data action: old run folders and the index (schema v7) are unchanged. BEHAVIOR: additive and non-breaking to the schema; the DEFAULT method stays 'lorentzian' so existing calls keep working, but because the baseline algorithm changed a re-fit of the SAME raw data can shift f_r/kappa slightly (more accurate on sloped backgrounds). 'circle' needs genuine phase and FAILS GRACEFULLY (outcome FAILED, no writeback) on the simulated backend whose Q quadrature is noise; on real hardware it returns f_r/kappa plus Qi/Qc. Circle's extra quality factors appear in the run result but are not yet proposed to Resonator physical fields (follow-up). RE-TAG PROVENANCE: the three driver v0.10.2 tags are no-change re-tags on the exact v0.10.1 commits (verified identical); mid-retag one command ran without an explicit cd and hit an already-tagged repo, failing harmlessly at git tag before any push -- scqo-contrib was then retagged correctly and all four scqo-versioned repos verified at v0.10.2 on origin."

