# Release manifest — which tag of each repo belongs to a release combo.
# The server checks out ONE release name across the scqo-versioned repos and takes
# scqat at its pinned tag (scqat versions independently: its own pyproject/tag line).
# Hand-edited at release time by the manager (see RELEASING.md).

[v0-9-0]
date = 2026-07-17
scqo = "v0.9.0"
lchqbdriver = "v0.9.0"           # hw-config null poisoning: exclude_none save + load normalization + offline compile gate
lchqmdriver = "v0.9.0"           # docs only: instrument_config is DERIVED from the registry keys
scqo-contrib = "v0.9.0"          # no-change re-tag
scqat = "v0.1.6"                 # unchanged pin
notes = "Per-(cooldown, setup) state + the operator's own values. State and physics move into each context's OWN folder <device>/<cooldown>/<setup>/scqo/ (scqo_state.json + physical.json), so two users on two setups of ONE sample never share or clobber a file; every ChangeRecord is stamped with the writing session's setup, and scqo state prints a context header saying whose numbers you are reading. ALL folder locations are DERIVED from the registry keys: a [<cycle>.setup.<name>] table is exactly backend + optional note, and the vendor folder is the sibling <cooldown>/<setup>/backend_config/ (injected by load_cooldowns as setup['instrument_config'], so factories/doctor/viewer still read one key). The sibling split keeps SCQO files out of QUAM's state-directory rglob by construction. Change history moves OUT of the values files into append-only sidecars scqo_state.history.jsonl / physical.history.jsonl (one ChangeRecord per line; new scqo/_state_io.py owns the lock + reader/writer): values files are values-only, a pre-split file's embedded history loads once and splits out on the next save, and BOTH stores now merge history under the lock -- two same-setup sessions can no longer erase each other's rows, and deleting scqo_state.json reseeds calibration WITHOUT losing provenance. NEW scqo suggest <run_id> QUBIT.FIELD=VALUE: when the estimator failed but the run's figure shows the value, attach YOUR reading to the run that justifies it as a pending origin='operator' suggestion (proposed_by/proposed_at stamped), decided through the SAME accept path and guards and credited to that run; marked [operator: <login>] in the CLI table and badged on the viewer's run page. record.json's read-modify-write is now locked (DataStore.edit_suggestions): suggest appends to the FRESH list, accept/reject replace only the rows they decided, tag_run re-reads under the lock -- concurrent writers cannot silently erase each other's proposals or decisions. scqo accept on a run with no suggestions now names scqo suggest instead of printing nothing (and short-circuits before the driver import). PhysicalStore.record refuses unknown field names (a typo used to persist silently). UPGRADE REQUIRES: hand-edit each device's cooldowns.toml -- DELETE every instrument_config line (a typed path is now refused LOUDLY, naming the derived folder) and move that setup's vendor config files into <device>/<cooldown>/<setup>/backend_config/ under the canonical names (qblox: dut_config.json + hw_config.json; qm: state.json + wiring.json). Setup names differing only by letter case are refused and cooldown ids must be filename-safe (both are folder segments now). No reinstall: no entry-point changes, git pull suffices on editables; the run index is unchanged (schema v7, no reindex). BEHAVIOR CHANGE: the per-device scqo_state.json and the device-level physical.json are RETIRED -- simply not read (fresh start); history starts fresh per context, and in pull mode calibration reseeds from the vendor config anyway."

[v0-8-0]
date = 2026-07-14
scqo = "v0.8.0"
lchqbdriver = "v0.8.0"           # readout_power_dbm via output_att solve; save() writes hw_config.json too
lchqmdriver = "v0.8.0"           # readout_power_dbm via power_tools (bidirectional full-scale)
scqo-contrib = "v0.8.0"          # no-change re-tag
scqat = "v0.1.6"                 # punchout figure: amp/chain subplot + axis-kind/mode labels (optional plotdata coords; one shared form)
notes = "Two-mode readout power. RENAME: the fast (FPGA amplitude-sweep) punchout is resonator_spectroscopy_power_amp (no alias; rename parameters.toml sections; old runs stay under the old name) -- it gains resonator_relaxation_time_ns (ring-down wait; QM overrides QUAM depletion_time, Qblox the IdlePulse) and both backends acquire amplitude->averages->frequency (frequency innermost/fastest; acquired axis order power,detuning -- scqat transposes by name). New PUSHED field readout_power_dbm (absolute dBm at the port): setters solve the output chain (QM full_scale_power_dbm -11..+16 by 3, bidirectional; Qblox output_att even 0..60 + nominal +5 dBm full scale, ±few dB) keeping the digital amplitude <= 0.5 full scale (canonical operating point); readout_amp moves as a COUPLED side effect, now recorded explicitly (ChangeRecord.coupled_to; RecordingDevice re-reads sibling pushed fields after every push so staleness/provenance stay truthful). New experiment resonator_spectroscopy_power_chain: the CAREFUL punchout (chain-stepped: python loop re-solves the chain per point at amp ~0.5, one 1D scan per point, boundary-recorded set/revert). BOTH punchouts take IDENTICAL absolute-dBm inputs (min/max_power_dbm, default -50..-20), report an ABSOLUTE dBm axis and propose readout_power_dbm + readout_freq, named for the knob each sweeps: _amp = the fast single-program FPGA amplitude sweep, realized set-top -> sweep down -> auto-revert (the qualibrate LCH pattern; boundary-recorded like _chain; prefactors shared, the QM probe module + LCH node unchanged; uniform-dBm axis on BOTH backends -- Qblox unrolls the amplitude axis point-by-point since scheduler loop domains are linear-only); _chain = the chain-stepped wide, cross-backend-comparable sweep. Each figure labels its mode and both share ONE format (map + amp/chain subplot). Both REFUSE when a qubit's readout_power_dbm is unknown (no readout_amp fallback). PARAM RENAME: _amp's min/max_power_db (relative dB) -> min/max_power_dbm (absolute); stale parameters.toml keys fail loudly. Run records gain power_context (raw chain values per qubit at run end; record.json only, index schema stays v7 -- no reindex). Qblox save() now writes hw_config.json back and syncs the dut-embedded copy. UPGRADE REQUIRES: nothing -- no entry-point changes, git pull suffices (editables); old state files load (the new field backfills from the vendor). BEHAVIOR CHANGE: first readout_power_dbm write normalizes a legacy chain to the amp<=0.5 canonical form (older pending readout_amp suggestions may go stale, truthfully); QM stays state_sync=pull."

[v0-7-0]
date = 2026-07-12
scqo = "v0.7.0"
lchqbdriver = "v0.7.0"           # factory text; ENTIRE scripts/ wrapper layer retired (wrappers, shims, launcher stubs)
lchqmdriver = "v0.7.0"           # same: scripts/ keeps only check_real_config.py
scqo-contrib = "v0.7.0"          # no-change re-tag
scqat = "v0.1.5"                 # unchanged pin
notes = "Named user-selectable setups: cooldowns.toml setups become [cycle.setup.<name>] tables (keys backend/instrument_config/note; 'since' dates + port maps retired — wiring lives in the vendor config folder; the v0.6 [[.setup]] array form refuses loudly). user.toml gains setup; scqo user --device/--setup selects (and WRITES user.toml); a single-setup cycle auto-selects, several refuse until selected. Zero-setup cycles are legal (cooldown start opens an EMPTY cycle; runs refuse until a setup block is hand-added). Runs stamp (cooldown, setup NAME); index auto-rebuilds (schema v7, old runs reindex with empty setup); scqo find --setup; accept era guard compares names. CLI regrouping: state (was device), user (new), device = admin group absorbing devices/sample/cooldown (no aliases); sync-launchers RETIRED with the drivers' whole scripts/ wrapper layer (command wrappers, _lab/_cli shims, launcher stubs) — scqo run <name> is the one way; driver scripts/ keeps only per-repo content (check_real_config.py + LCHQB's ai_loop_demo.py). UPGRADE REQUIRES: hand-edit each device's cooldowns.toml to named setup tables (fresh-start: old array form is not read); no reinstall needed. BEHAVIOR CHANGE: multi-setup cycles refuse runs until scqo user --setup."

